[project]
name = "client-credentials"
version = "1.0.0"
description = "Credentials adapter for HMP client module"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "client-core",
    "shared-kernel",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
client-core = { workspace = true }
shared-kernel = { workspace = true }
