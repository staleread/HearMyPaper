[project]
name = "client-core"
version = "1.0.0"
description = "Core of HMP client module"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "pydantic>=2.11.9",
    "result>=0.17.0",
    "shared-kernel",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
shared-kernel = { workspace = true }
