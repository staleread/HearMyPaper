[project]
name = "client-file-manager"
version = "1.0.0"
description = "File manager adapter for HMP client module"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "client-core",
    "httpx>=0.28.1",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
client-core = { workspace = true }
