[project]
name = "submissions-postgres"
version = "1.0.0"
description = "Postgres adapter for HMP submissions module"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "submissions-core",
    "sqlalchemy[asyncio]>=2.0.49",
    "asyncpg>=0.31.0",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
submissions-core = { workspace = true }
