[project]
name = "education-api"
version = "1.0.0"
description = "API adapter for HMP education module"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "blacksheep>=2.6.2",
    "education-core",
    "pydantic>=2.13.4",
    "shared-kernel",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
education-core = { workspace = true }
shared-kernel = { workspace = true }
