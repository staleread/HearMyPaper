[project]
name = "identity-redis"
version = "1.0.0"
description = "Redis adapter for HMP identity project"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "redis>=7.4.0",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "types-redis>=4.6.0.20241004",
]
