[project]
name = "identity-postgres"
version = "1.0.0"
description = "Postgres adapter for HMP identity module"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "asyncpg>=0.31.0",
    "identity-core",
    "shared-kernel",
    "sqlalchemy>=2.0.49",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
shared-kernel = { workspace = true }
identity-core = { workspace = true }
