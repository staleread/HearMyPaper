[project]
name = "identity-id"
version = "1.0.0"
description = "Identity generator adapter for HMP identity module"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "identity-core",
    "uidgen>=1.0.2",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
identity-core = { workspace = true }
