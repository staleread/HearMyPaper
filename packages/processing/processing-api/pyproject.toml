[project]
name = "processing-api"
version = "1.0.0"
description = "API for processing module"
readme = "README.md"
authors = [
    { name = "K1ngston1", email = "kingstn29@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "blacksheep>=2.6.2",
    "pydantic>=2.13.4",
    "processing-core",
    "shared-kernel",
]

[tool.uv.sources]
processing-core = { workspace = true }
shared-kernel = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.13,<0.12.0"]
build-backend = "uv_build"
