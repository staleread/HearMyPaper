[project]
name = "processing-orchestrator-bridge"
version = "0.1.0"
description = "Bridge between processing and orchestrator modules"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "processing-core",
    "orchestrator-core",
]

[tool.uv.sources]
processing-core = { workspace = true }
orchestrator-core = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.13,<0.12.0"]
build-backend = "uv_build"
