[project]
name = "processing-parser"
version = "1.0.0"
description = "PDF parsing adapter for HMP processing module"
readme = "README.md"
authors = [
    { name = "K1ngston1", email = "kingstn29@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "pymupdf>=1.25.3",
    "processing-core",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
processing-core = { workspace = true }
