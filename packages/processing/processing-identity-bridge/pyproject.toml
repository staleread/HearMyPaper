[project]
name = "processing-identity-bridge"
version = "1.0.0"
description = "Bridge between processing and identity modules"
readme = "README.md"
authors = [
    { name = "K1ngston1", email = "kingstn29@gmail.com" }
]

requires-python = ">=3.14"
dependencies = [
    "processing-core",
    "identity-core",
]

[tool.uv.sources]
processing-core = { workspace = true }
identity-core = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.13,<0.12.0"]
build-backend = "uv_build"
