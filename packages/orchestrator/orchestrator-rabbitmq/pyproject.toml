[project]
name = "orchestrator-rabbitmq"
version = "1.0.0"
description = "RabbitMQ adapter for HMP orchestrator module"
readme = "README.md"
authors = [
    { name = "K1ngston1", email = "kingstn29@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "orchestrator-core",
    "shared-kernel",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
orchestrator-core = { workspace = true }
shared-kernel = { workspace = true }
