[project]
name = "orchestrator-redis"
version = "0.1.0"
description = "Redis implementation of worker registry"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "redis>=7.4.0",
    "orchestrator-core",
]

[tool.uv.sources]
orchestrator-core = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.13,<0.12.0"]
build-backend = "uv_build"
