[project]
name = "shared-kernel"
version = "1.0.0"
description = "Shared kernel for HMP modules"
readme = "README.md"
authors = [
    { name = "Mykola Ratushniak", email = "nicolas.ratushniak@gmail.com" }
]
requires-python = ">=3.14"
dependencies = [
    "aioboto3>=15.5.0",
    "pynacl>=1.6.2",
    "sqlalchemy>=2.0.49",
]

[build-system]
requires = ["uv_build>=0.11.8,<0.12.0"]
build-backend = "uv_build"

[dependency-groups]
dev = [
    "types-aioboto3>=15.5.0",
]
