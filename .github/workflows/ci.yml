name: CI (mypy + ruff)

on: [push]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - run: pip install .[dev]

      - name: Lint
        run: ruff check .

      - name: Type-check
        run: mypy --follow-untyped-imports .
