name: CI (ty + ruff)

on: [push]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Lint and Format (ruff)
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Sync dependencies
        run: uv sync --all-packages

      - name: Type-check (ty)
        run: uv run ty check
